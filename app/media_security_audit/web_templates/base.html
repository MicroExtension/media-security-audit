<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MEDIA Security Audit{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">MEDIA Security Audit</a>
    <nav class="topnav">
      <a href="/">Dashboard</a>
      <a href="/templates">Templates</a>
      <a href="/remediations">Remediations</a>
      <a href="/system">System</a>
    </nav>
  </header>
  <main class="shell">
    {% if message %}
    <div class="alert alert-success">{{ message }}</div>
    {% endif %}
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    <span>Data: {{ data_dir }}</span>
  </footer>
</body>
</html>
