services:
  media-audit:
    build:
      context: .
    image: media-security-audit:local
    container_name: media-security-audit
    restart: unless-stopped
    user: "${MEDIA_AUDIT_UID:-10001}:${MEDIA_AUDIT_GID:-10001}"
    command:
      - media-audit
      - web
      - --data-dir
      - /var/lib/media-audit/data
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    ports:
      - "${MEDIA_AUDIT_BIND:-127.0.0.1}:${MEDIA_AUDIT_PORT:-8080}:8080"
    volumes:
      - ./data:/var/lib/media-audit/data
      - ./runs:/var/lib/media-audit/runs
      - ./reports:/var/lib/media-audit/reports
      - ./evidence:/var/lib/media-audit/evidence
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
